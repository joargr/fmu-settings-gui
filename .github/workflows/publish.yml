name: Publish to PyPI or upload to bleeding release

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fmu-settings-gui
    permissions:
      id-token: write
      contents: write

    steps:
    - name: Checkout commit locally
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3.12

    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: 10
        run_install: false

    - name: Install Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22

    - name: Install build dependencies
      run: |
        pip install -U pip
        pip install build

    - name: Build distributions
      run: python -m build -vv

    - name: Publish package distributions to PyPI
      if: ${{ !github.event.release.prerelease }}
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
    
    - name: Upload package distributions to GitHub release
      if: ${{ github.event.release.prerelease }}
      run: |
        dir_dist="dist/"
        whl_file=$(find "$dir_dist" -maxdepth 1 -name "*.whl")

        fixed_bleeding_name="fmu_settings_gui-bleeding.whl"
        echo "Renaming .whl file to $fixed_bleeding_name"
        mv "$whl_file" "$dir_dist$fixed_bleeding_name"

        gh release upload ${{github.event.release.tag_name}} $dir_dist$fixed_bleeding_name --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
