name: Publish to PyPI or upload to bleeding release

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fmu-settings-gui
    permissions:
      id-token: write
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Install pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10
        run_install: false

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Install build dependencies
      run: |
        pip install -U pip
        pip install build

    - name: Build distributions
      run: python -m build -vv

    - name: Publish package distributions to PyPI
      if: ${{ !github.event.release.prerelease }}
      uses: pypa/gh-action-pypi-publish@release/v1
    
    - name: Upload package distributions to GitHub release
      if: ${{ github.event.release.prerelease }}
      run: |
        dir_dist="dist/"
        whl_file=$(find "$dir_dist" -maxdepth 1 -name "*.whl")

        fixed_bleeding_name="fmu_settings_gui-bleeding.whl"
        echo "Renaming .whl file to $fixed_bleeding_name"
        mv "$whl_file" "$dir_dist$fixed_bleeding_name"

        gh release upload ${{github.event.release.tag_name}} $dir_dist$fixed_bleeding_name --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
