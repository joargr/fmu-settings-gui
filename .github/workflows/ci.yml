name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  schedule:
    # Run nightly to check that tests are working with latest dependencies
    - cron: "0 0 * * *"

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout commit locally
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install with dependencies
        if: ${{ always() }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            uv sync --all-extras --upgrade
          else
            uv sync --all-extras --frozen
          fi

      - name: List all installed packages
        run: uv pip freeze

      - name: Ruff check
        if: ${{ always() }}
        run: uv run ruff check

      - name: Ruff format
        if: ${{ always() }}
        run: uv run ruff format --check

      - name: Check typing with mypy
        if: ${{ always() }}
        run: uv run mypy src tests

      - name: Run tests
        if: ${{ always() }}
        run: uv run pytest -n auto tests --cov=src/ --cov-report term-missing

  check-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit locally
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "frontend"

      - name: Install with dependencies
        if: ${{ always() }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            uv sync --all-extras --upgrade
          else
            uv sync --all-extras --frozen
          fi

      - name: List all installed packages
        run: uv pip freeze

      - name: Ensure pip builds React app
        run: uv build -v

  check-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit locally
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "frontend"

      - name: Setup Biome CLI
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.4.4

      - name: Install packages
        run: |
          cd frontend
          pnpm install

      - name: Lint
        run: |
          cd frontend
          pnpm run ci-lint

      - name: Build
        run: |
          cd frontend
          pnpm run build
